<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lab2网页布局实验</title>
    <link rel="stylesheet" href="css/lab2-2504-151-index.css">
</head>
<body>
    <header class="header">
        <div class="logo">我的图书商城</div>
        <nav class="topNav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
            </ul>
        </nav>
    </header>
    <div class="mainBox">
        <aside class="left">
            <h3>图书分类导航</h3>
            <ul>
                <li>文学类</li>
                <li>历史类</li>
                <li>哲学与宗教</li>
                <li>社会科学</li>
                <li>政治法律</li>
            </ul>
        </aside>
        <section class="middle">
            <h3>图书展示区</h3>
            <div class="bookBox">
                <div class="bookItem">
                    <img src="https://bpic.588ku.com/back_origin_min_pic/20/11/06/b79d2cb1877b3a7f5188bcd4ce960943.jpg" width="180" height="220" alt="图书封面">
                    <div class="tip">点击查看详情</div>
                </div>
            </div>
            <h3>热门推荐</h3>
            <div class="hotList">
                <div class="hotItem">《红楼梦》</div>
                <div class="hotItem">《西游记》</div>
                <div class="hotItem">《水浒传》</div>
            </div>
            <h3>新书上市</h3>
            <table border="1" cellpadding="8" cellspacing="0">
                <tr>
                    <th>书名</th>
                    <th>作者</th>
                    <th>价格</th>
                </tr>
                <tr>
                    <td>寻求承认</td>
                    <td>查尔斯.泰勒</td>
                    <td>79元</td>
                </tr>
                <tr>
                    <td>论秩序</td>
                    <td>奥古斯丁</td>
                    <td>68元</td>
                </tr>
            </table>
        </section>
        <aside class="right">
            <h3>限时促销</h3>
            <p>全场图书9折优惠</p>
            <p>充值500送300</p>
            <p>会员专享额外8折</p>
        </aside>
    </div>
</body>
</html>
